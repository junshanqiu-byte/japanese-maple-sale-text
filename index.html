<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 项目主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #1a1a1a;
            color: #fff;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #4cd964;
        }
        .page-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }
        .page-item a {
            display: block;
            padding: 20px;
            background: #2d2d2d;
            border-radius: 8px;
            text-align: center;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }
        .page-item a:hover {
            background: #4cd964;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>山秋枫树园直播间全话术体系</h1>
        <div class="page-list">
            <div class="page-item"><a href="1.html">共鸣话术</a></div>
            <div class="page-item"><a href="2.html">互动话术</a></div>
            <div class="page-item"><a href="3.html">点对点互动话术</a></div>
            <div class="page-item"><a href="4.html">保障话术</a></div>
            <div class="page-item"><a href="5.html">人设话术</a></div>
            <div class="page-item"><a href="6.html">放价与收尾话术</a></div>
        </div>
    </div>
</body>
</html>
